name: Sync upstream versions

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve latest upstream versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reasonix_version="$(
            curl -fsSL \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              https://api.github.com/repos/esengine/DeepSeek-Reasonix/releases \
            | node -e '
                const releases = JSON.parse(require("fs").readFileSync(0, "utf8"));
                const cli = releases.find((release) => /^v\d+\.\d+\.\d+/.test(release.tag_name));
                if (!cli) {
                  process.exit(1);
                }
                process.stdout.write(cli.tag_name.replace(/^v/, ""));
              '
          )"
          lark_cli_version="$(npm view @larksuite/cli version)"
          echo "reasonix_version=${reasonix_version}" >> "$GITHUB_OUTPUT"
          echo "lark_cli_version=${lark_cli_version}" >> "$GITHUB_OUTPUT"

      - name: Update Dockerfile pins
        env:
          REASONIX_VERSION: ${{ steps.versions.outputs.reasonix_version }}
          LARK_CLI_VERSION: ${{ steps.versions.outputs.lark_cli_version }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("Dockerfile")
          text = path.read_text()
          text = re.sub(
              r"^ARG REASONIX_VERSION=.*$",
              f"ARG REASONIX_VERSION={os.environ['REASONIX_VERSION']}",
              text,
              flags=re.MULTILINE,
          )
          text = re.sub(
              r"^ARG LARK_CLI_VERSION=.*$",
              f"ARG LARK_CLI_VERSION={os.environ['LARK_CLI_VERSION']}",
              text,
              flags=re.MULTILINE,
          )
          path.write_text(text)
          PY

      - name: Commit and push version bump
        run: |
          if git diff --quiet -- Dockerfile; then
            echo "No upstream version change detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "Bump reasonix and lark-cli versions"
          git push
