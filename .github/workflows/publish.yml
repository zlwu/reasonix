name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/reasonix

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Extract pinned versions
        id: versions
        run: |
          reasonix_version="$(sed -n 's/^ARG REASONIX_VERSION=//p' Dockerfile)"
          lark_cli_version="$(sed -n 's/^ARG LARK_CLI_VERSION=//p' Dockerfile)"
          echo "reasonix_version=${reasonix_version}" >> "$GITHUB_OUTPUT"
          echo "lark_cli_version=${lark_cli_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.version=${{ steps.versions.outputs.reasonix_version }}
            io.reasonix.version=${{ steps.versions.outputs.reasonix_version }}
            io.larksuite.cli.version=${{ steps.versions.outputs.lark_cli_version }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
