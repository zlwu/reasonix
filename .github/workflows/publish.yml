name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_call:
    inputs:
      ref:
        description: Commit to build after an upstream-sync update.
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/reasonix

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Read image component versions from Dockerfile
        id: versions
        run: |
          reasonix_version="$(awk -F= '/^ARG REASONIX_VERSION=/{print $2}' Dockerfile)"
          lark_cli_version="$(awk -F= '/^ARG LARK_CLI_VERSION=/{print $2}' Dockerfile)"
          base_image_digest="$(sed -n 's/^FROM node:24-bookworm-slim@//p' Dockerfile)"
          test -n "${reasonix_version}"
          test -n "${lark_cli_version}"
          test -n "${base_image_digest}"
          echo "reasonix_version=${reasonix_version}" >> "$GITHUB_OUTPUT"
          echo "lark_cli_version=${lark_cli_version}" >> "$GITHUB_OUTPUT"
          echo "base_image_digest=${base_image_digest}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.version=${{ steps.versions.outputs.reasonix_version }}
            io.reasonix.version=${{ steps.versions.outputs.reasonix_version }}
            io.larksuite.cli.version=${{ steps.versions.outputs.lark_cli_version }}
            io.reasonix.base-image.digest=${{ steps.versions.outputs.base_image_digest }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
