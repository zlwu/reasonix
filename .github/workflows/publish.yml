name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/reasonix

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve latest upstream versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reasonix_version="$(
            curl -fsSL \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              https://api.github.com/repos/esengine/DeepSeek-Reasonix/releases \
            | node -e '
                const releases = JSON.parse(require("fs").readFileSync(0, "utf8"));
                const cli = releases.find((release) => /^v\d+\.\d+\.\d+/.test(release.tag_name));
                if (!cli) {
                  process.exit(1);
                }
                process.stdout.write(cli.tag_name.replace(/^v/, ""));
              '
          )"
          lark_cli_version="$(npm view @larksuite/cli version)"
          echo "reasonix_version=${reasonix_version}" >> "$GITHUB_OUTPUT"
          echo "lark_cli_version=${lark_cli_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |
            org.opencontainers.image.version=${{ steps.versions.outputs.reasonix_version }}
            io.reasonix.version=${{ steps.versions.outputs.reasonix_version }}
            io.larksuite.cli.version=${{ steps.versions.outputs.lark_cli_version }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            REASONIX_VERSION=${{ steps.versions.outputs.reasonix_version }}
            LARK_CLI_VERSION=${{ steps.versions.outputs.lark_cli_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
